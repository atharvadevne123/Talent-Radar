version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://talent:talent@db:5432/talent_radar
      - MODEL_PATH=/app/models/talent_radar.pkl
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_store:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talent
      POSTGRES_DB: talent_radar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent -d talent_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  model_store:
